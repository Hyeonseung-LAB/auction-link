<!doctype html><html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{--blue:#3182f6;--ink:#191f28;--gray:#8b95a1}
  *{box-sizing:border-box}
  body{margin:0;background:#f2f4f8;font-family:-apple-system,'Malgun Gothic',sans-serif;color:var(--ink)}
  .stage{max-width:960px;margin:20px auto;background:#fff;border-radius:24px;
    box-shadow:0 8px 30px rgba(20,30,60,.08);padding:18px 18px 8px}
  h1{font-size:20px;margin:4px 6px 2px}
  .sub{font-size:13px;color:var(--gray);margin:0 6px 10px}
  .mapwrap{position:relative}
  svg{width:100%;height:auto;display:block}
  .gu{fill:#fbfcfe;stroke:#dde2ea;stroke-width:1.3;stroke-linejoin:round}
  .river{fill:#cfe6ff;fill-rule:evenodd;stroke:#b4d8ff;stroke-width:.8;pointer-events:none}
  .lbl{font-size:12.5px;fill:#aab3bd;text-anchor:middle;pointer-events:none;font-weight:600}
  .mk{fill:var(--blue);stroke:#fff;stroke-width:2;cursor:pointer;
    filter:drop-shadow(0 1px 2px rgba(49,130,246,.4));transition:r .1s}
  .mk:hover{r:9}
  .mk.on{stroke:#191f28;stroke-width:2.5}
  .mk.opp{fill:url(#rainbow);stroke:#fff;filter:drop-shadow(0 0 5px rgba(255,120,180,.7))}
  /* 팝업 카드 */
  #card{position:absolute;display:none;width:236px;background:#fff;border-radius:16px;
    box-shadow:0 10px 30px rgba(20,30,60,.18);padding:13px 15px;z-index:5;
    transform:translate(-50%,-116%)}
  #card .ttl{font-weight:700;font-size:14px;line-height:1.35;margin-bottom:6px;word-break:keep-all}
  #card .case{color:var(--gray);font-weight:400;font-size:12px}
  #card .row{font-size:13px;color:#4e5968;margin-top:4px;word-break:keep-all;line-height:1.4}
  #card .price{color:#f04452;font-weight:700}
  #card .opp{color:#e0399a;font-weight:700}
  #card .risk{color:#e8590c;font-size:12px;margin-top:4px;font-weight:600;word-break:keep-all}
  #card a.go{display:block;text-align:center;margin-top:10px;background:var(--blue);color:#fff;
    text-decoration:none;padding:9px;border-radius:10px;font-weight:700;font-size:13px}
  #card .x{position:absolute;top:8px;right:11px;color:#c4ccd4;cursor:pointer;font-size:16px}
  .legend{font-size:12px;color:var(--gray);margin:8px 6px 6px}
  .legend b{color:#e0399a}
</style></head><body>

const VW=1000, VH=840;
const svg=document.getElementById('map'), card=document.getElementById('card');
let cur=null;
function show(i, el){
  const p=P[i];
  let mkt = p.market_pct
    ? ('<div class="row'+(p.opp?' opp':'')+'">📊 실거래가 감정가의 <b>'+p.market_pct+'%</b>'+(p.opp?' 🌈 기회물건!':'')+'</div>')
    : '<div class="row" style="color:#b0b8c1">📊 실거래 정보 없음</div>';
  let sub = '';
  if(p.subway){ sub='<div class="row">🚇 '+p.subway+'</div>'; if(p.walk) sub+='<div class="row">🚶 도보 '+p.walk+'분</div>'; }
  let risk = p.risk? ('<div class="risk">⚠️ '+p.risk+'</div>'):'';
  card.innerHTML='<span class="x">×</span>'
    +'<div class="ttl">'+p.title+(p.case?' <span class=case>'+p.case+'</span>':'')+'</div>'
    +'<div class="row price">💰 감정가 '+p.appraisal+'</div>'
    +mkt
    +(p.area?'<div class="row">📐 전용 '+p.area+'</div>':'')
    +sub+risk
    +'<a class="go" href="'+p.url+'" target="_blank" rel="noopener">자세히 보기 →</a>';
  const r=svg.getBoundingClientRect();
  card.style.left=(p.x/VW*r.width)+'px';
  card.style.top=(p.y/VH*r.height)+'px';
  card.style.display='block';
  if(cur) cur.classList.remove('on');
  el.classList.add('on'); cur=el;
}
svg.querySelectorAll('.mk').forEach(el=>{
  el.addEventListener('click', e=>{e.stopPropagation(); show(+el.dataset.i, el);});
});
document.addEventListener('click', e=>{
  if(e.target.classList.contains('x')||!e.target.closest('#card')){
    card.style.display='none'; if(cur){cur.classList.remove('on');cur=null;}
  }
});
